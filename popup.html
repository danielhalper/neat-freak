<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neat Freak</title>
    <style>
      /* Popup window background matches the panel's cream card so the two
         feel like the same surface. The panel script mounts the shadow-DOM
         host inside .popup-body and fills it edge-to-edge (in-popup mode). */
      html, body {
        margin: 0;
        padding: 0;
        background: #fdfcf8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body.popup-body {
        width: 420px;
        min-height: 590px;
        visibility: hidden;
      }
    </style>
  </head>
  <body class="popup-body">
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
