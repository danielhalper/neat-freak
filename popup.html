<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neat Freak</title>
    <style>
      /* The popup serves two paths:
         1. Inject the panel into the active tab (most common) — popup.js
            calls window.close() before this ever needs to render.
         2. Fall back to rendering the panel inline (chrome:// pages, etc.)
         For path #1 we don't want Chrome to even briefly show a 420×590
         cream rectangle, so the body starts at 0×0 and is only expanded
         to the real popup dimensions by popup.js when it's confirmed the
         inline path is needed. */
      html, body {
        margin: 0;
        padding: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html { background: transparent; }
      body.popup-body {
        width: 0;
        height: 0;
        overflow: hidden;
        background: transparent;
      }
      body.popup-body.popup-body--mounted {
        width: 420px;
        height: auto;
        min-height: 590px;
        overflow: visible;
        background: #fdfcf8;
      }
    </style>
  </head>
  <body class="popup-body">
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
